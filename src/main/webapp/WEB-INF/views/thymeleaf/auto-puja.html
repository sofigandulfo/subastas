<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Auto-Puja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand app-brand" th:href="@{/subastas}">SubastApp</a>
            <div class="d-flex gap-2">
                <a id="btn-mi-perfil" th:if="${estaLogueado}" th:href="@{/perfil}" class="btn btn-outline-light">Mi perfil</a>
                <a id="btn-cerrar-sesion" th:if="${estaLogueado}" th:href="@{/logout}" class="btn btn-outline-light">Cerrar sesión</a>
                <a th:unless="${estaLogueado}" th:href="@{/login}" class="btn btn-app-primary">Iniciar sesión</a>
            </div>
        </div>
    </nav>

    <main class="app-page-narrow">
        <section class="app-card form-card">
            <div class="app-card-body">
                <h1 class="page-title">Configurar auto-puja</h1>
                <p class="page-subtitle mb-4">Definí hasta cuánto querés pagar y el sistema ofertará por vos.</p>

                <div class="app-card app-card-body mb-4">
                    <p class="mb-1">Artículo: <strong th:text="${subasta.detalle.nombre}">Producto</strong></p>
                    <p class="mb-1">Precio actual: <strong th:text="'$' + ${subasta.precioActual}">$0.00</strong></p>
                    <p class="text-muted mb-0">El bot pujará automáticamente en incrementos de $100.00 cada vez que alguien supere tu oferta.</p>
                </div>

                <form th:action="@{/auto-pujar/{id}(id=${subasta.id})}" th:object="${autoPujaDTO}" method="POST">
                    <div class="mb-3">
                        <label for="montoMaximo" class="form-label">Monto máximo dispuesto a pagar</label>
                        <input id="montoMaximo" th:field="*{montoMaximo}" class="form-control"
                            type="number" step="0.01" min="0" placeholder="Ejemplo: 5000.00" required>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <strong th:text="${error}"></strong>
                    </div>

                    <button type="submit" class="btn btn-app-primary w-100">Activar auto-puja</button>
                    <a th:href="@{/detalle-subasta(id=${subasta.id})}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
