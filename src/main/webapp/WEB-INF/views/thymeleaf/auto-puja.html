<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Auto-Puja</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>
<body class="w3-light-grey">

<div class="w3-content w3-padding-32" style="max-width:600px">
    <div class="w3-card-4 w3-white w3-round-large">

        <div class="w3-container w3-blue w3-round-large">
            <h2 class="w3-center w3-xxlarge w3-text-white w3-sans-serif">
                Configurar Auto-Puja
            </h2>
        </div>

        <div class="w3-container w3-padding-24">
            <div class="w3-panel w3-pale-blue w3-leftbar w3-border-blue w3-round w3-margin-bottom">
                <p class="w3-large">Artículo: <strong th:text="${subasta.detalle.nombre}">Producto</strong></p>
                <p class="w3-large">Precio Actual: <strong th:text="'$' + ${subasta.precioActual}">$0.00</strong></p>
                <p class="w3-small w3-text-grey">Nota: El bot pujará automáticamente en incrementos de $100.00 cada vez que alguien supere tu oferta.</p>
            </div>

            <form th:action="@{/auto-pujar/{id}(id=${subasta.id})}" th:object="${autoPujaDTO}" method="POST" class="w3-container">

                <label class="w3-text-dark-grey">
                    <b>Monto Máximo Dispuesto a Pagar</b>
                </label>
                <input th:field="*{montoMaximo}" class="w3-input w3-border w3-round w3-margin-bottom"
                       type="number" step="0.01" min="0" placeholder="Ejemplo: 5000.00" required>

                <div th:if="${error}" class="w3-panel w3-pale-red w3-border w3-border-red w3-round">
                    <p class="w3-text-red"><b th:text="${error}"></b></p>
                </div>

                <button type="submit" class="w3-button w3-blue w3-hover-dark-grey w3-round w3-block w3-margin-top w3-large w3-sans-serif">
                    Activar Guardián de Puja
                </button>

                <a th:href="@{/detalle-subasta(id=${subasta.id})}"
                   class="w3-button w3-light-grey w3-hover-red w3-round w3-block w3-margin-top w3-center" style="text-decoration: none;">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
