<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Ofertar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="#">UNLAM</a>
    </nav>
    <main role="main" class="container">
        <div class="container">
            <div id="loginbox" style="margin-top:50px;" class="mainbox col-md-6 col-md-offset-3 col-sm-8 col-sm-offset-2">
                <form action="#" th:action="@{/ofertar}" method="POST" th:object="${oferta}">
                    <h3 class="form-signin-heading">Ofertar en Subasta</h3>
                    <hr class="colorgraph"><br>
                    <p>Precio actual: <strong th:text="${subasta.precioActual}"></strong></p>
                    <input th:field="*{monto}" id="monto" type="number" class="form-control" placeholder="Ingrese su oferta" required />
                    <button class="btn btn-lg btn-primary btn-block" type="submit">Ofertar</button>
                    <p th:if="${error != null}" class="alert alert-danger" th:text="'Error ' + ${error}"></p>
                </form>
                <a href="#" class="btn btn-secondary mt-2">Volver</a>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>
</html>
