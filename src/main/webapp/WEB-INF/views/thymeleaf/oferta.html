<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Ofertar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand app-brand" th:href="@{/subastas}">SubastApp</a>
        <div class="d-flex gap-2">
            <a id="btn-mi-perfil" th:if="${estaLogueado}" th:href="@{/perfil}" class="btn btn-outline-light">Mi perfil</a>
            <a id="btn-cerrar-sesion" th:if="${session.USUARIO_ID != null}" th:href="@{/logout}" class="btn btn-outline-light">Cerrar sesión</a>
            <a th:unless="${session.USUARIO_ID == null}" th:href="@{/login}" class="btn btn-app-primary">Iniciar sesión</a>
        </div>
    </div>
</nav>

    <main class="app-page-narrow">
        <section id="loginbox" class="app-card form-card">
            <div class="app-card-body">
                <h1 class="page-title">Ofertar en subasta</h1>
                <p class="page-subtitle mb-4" th:text="${subasta.detalle.nombre}">Producto</p>

                <p class="text-muted mb-2" style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em">¿Cómo funciona?</p>
                <div class="puja-steps mb-3">
                    <div class="puja-step">
                        <i class="bi bi-pencil step-icon" aria-hidden="true"></i>
                        <span class="step-num">Paso 1</span>
                        <span class="step-desc">Ingresás el <strong>monto</strong> que querés ofertar</span>
                    </div>
                    <div class="puja-step">
                        <i class="bi bi-check-circle step-icon" aria-hidden="true"></i>
                        <span class="step-num">Paso 2</span>
                        <span class="step-desc">Confirmás la oferta con el botón</span>
                    </div>
                    <div class="puja-step">
                        <i class="bi bi-trophy step-icon" aria-hidden="true"></i>
                        <span class="step-num">Paso 3</span>
                        <span class="step-desc">Si nadie supera tu oferta, <strong>ganás</strong></span>
                    </div>
                </div>

                <div class="app-card app-card-body mb-4">
                    <div class="text-muted">Artículo</div>
                    <strong class="price" th:text="${subasta.detalle.nombre}">Producto</strong>

                    <div class="text-muted mt-3">Precio actual</div>
                    <strong class="price" th:text="'$' + ${subasta.precioActual}">$0.00</strong>
                </div>

                <form action="#" th:action="@{/ofertar/{id}(id=${subasta.id})}" method="POST" th:object="${oferta}">
                    <div class="mb-3">
                        <label for="monto" class="form-label">Tu oferta</label>
                        <input th:field="*{monto}" id="monto" type="number" class="form-control"
                            placeholder="Ingrese su oferta" required />
                    </div>

                    <button id="btn-ofertar" class="btn btn-app-primary w-100" type="submit">Ofertar</button>
                    <p id="mensaje-error-oferta" th:if="${error != null}" class="alert alert-danger mt-3"
                        th:text="'Error ' + ${error}"></p>
                </form>

                <a th:href="@{/detalle-subasta(id=${subasta.id})}" class="btn btn-outline-secondary w-100 mt-2">Volver</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
