<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subastas</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

<body class="w3-light-grey">

    <div class="w3-content w3-padding-32" style="max-width:1000px">

        <div class="w3-card-4 w3-white w3-round-large w3-margin-bottom">
            <div class="w3-container w3-amber w3-round-large">
                <h2 id="titulo-subastas" class="w3-center w3-xxlarge w3-text-white">Subastas Disponibles</h2>
            </div>
        </div>

        <div class="w3-margin-bottom w3-display-container" style="height: 40px;">
            <div class="w3-display-left">
                <a id="btn-nueva-subasta" th:href="@{/crear-subasta}"
                    class="w3-button w3-amber w3-round w3-hover-dark-grey">
                    + Nueva Subasta
                </a>
            </div>

            <div class="w3-display-right" th:if="${estaLogueado}">
                <a id="btn-mi-perfil" th:href="@{/perfil}"
                    class="w3-button w3-blue w3-round w3-hover-dark-grey w3-margin-right">
                    Mi Perfil
                </a>
                <a id="btn-cerrar-sesion" th:href="@{/logout}" class="w3-button w3-red w3-round w3-hover-dark-grey">
                    Cerrar sesión
                </a>

                <a th:unless="${estaLogueado}" th:href="@{/login}"
                    class="w3-button w3-green w3-round w3-hover-dark-grey">
                    Iniciar sesión
                </a>
            </div>
        </div>

        <form th:action="@{/subastas}" method="get" class="w3-margin-bottom">
            <div class="w3-row">
                <div class="w3-col s9">
                    <input class="w3-input w3-border w3-round" type="text" name="busqueda"
                        placeholder="Buscar subastas..." th:value="${busqueda}">
                </div>

                <div class="w3-col s3">
                    <button type="submit" class="w3-button w3-amber w3-round w3-block">Buscar</button>
                </div>
            </div>
        </form>
        <div th:if="${estaLogueado}" id="seccion-recomendadas" class="w3-margin-bottom">
            <div class="w3-card-4 w3-white w3-round-large">
                <div class="w3-container w3-blue w3-round-top">
                    <h4 class="w3-text-white">Sugeridas para vos</h4>
                </div>
                <div class="w3-container w3-padding-16">
                    <div id="contenedor-recomendadas" class="w3-row-padding">
                        <p class="w3-text-grey">Cargando recomendaciones...</p>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(subastas)}" class="w3-card-4 w3-white w3-round-large w3-padding-24 w3-center">
            <p class="w3-large w3-text-grey">No hay subastas disponibles por el momento.</p>
        </div>

        <div class="w3-row-padding">
            <div class="w3-third w3-margin-bottom" th:each="subasta : ${subastas}">
                <div class="w3-card-4 w3-white w3-round-large">

                    <div class="w3-container w3-amber w3-round-top">
                        <h4 class="w3-text-white" th:text="${subasta.detalle.nombre}">Nombre</h4>
                    </div>

                    <div class="w3-center w3-border-bottom"
                        style="height: 200px; overflow: hidden; display: flex; justify-content: center; align-items: center; background-color: #f1f1f1;">

                        <img th:if="${imagenesBase64.containsKey(subasta.id)}"
                            th:src="@{'data:image/jpeg;base64,' + ${imagenesBase64.get(subasta.id)}}"
                            alt="Imagen del producto" style="max-width: 100%; max-height: 100%; object-fit: contain;">

                        <div th:unless="${imagenesBase64.containsKey(subasta.id)}" class="w3-text-grey">
                            <p><i class="w3-large">Sin imagen</i></p>
                        </div>
                    </div>

                    <div class="w3-container w3-padding-16">

                        <p class="w3-text-grey" th:text="${subasta.detalle.descripcion}">Descripción</p>

                        <p>
                            <b>Precio actual:</b>
                            <span th:text="'$' + ${subasta.precioActual}">$0</span>
                        </p>

                        <p>
                            <b>Categoría:</b>
                            <span th:text="${subasta.detalle.categoria}">-</span>
                        </p>

                        <p>
                            <b>Estado:</b>
                            <span class="w3-tag w3-round"
                                th:classappend="${subasta.estadoSubasta.name() == 'ACTIVA'} ? 'w3-green' : (${subasta.estadoSubasta.name() == 'CERRADA'} ? 'w3-red' : 'w3-orange')"
                                th:text="${subasta.estadoSubasta}">
                            </span>
                        </p>

                        <a th:href="@{/detalle-subasta(id=${subasta.id})}"
                            class="btn-ver-detalle w3-button w3-amber w3-round w3-block w3-hover-dark-grey w3-margin-top">
                            Ver detalle
                        </a>

                    </div>
                </div>
            </div>
        </div>

    </div>
    <script th:if="${estaLogueado}" th:src="@{/js/recomendaciones.js}"></script>
</body>

</html>
