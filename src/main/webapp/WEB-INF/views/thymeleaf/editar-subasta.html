<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
      href="https://www.w3schools.com/w3css/4/w3.css">
<head>
<title>Editar Subasta</title>
</head>
<body class="w3-light-grey">

<div class="w3-content w3-padding-32" style="max-width:700px">

    <div class="w3-card-4 w3-white w3-round-large">

        <div class="w3-container w3-amber w3-round-large">
            <h2 class="w3-center w3-xxlarge w3-text-white w3-sans-serif">
                Editar Subasta
            </h2>
        </div>

        <div class="w3-container w3-padding-24">

            <div th:if="${error}"
                 class="w3-panel w3-pale-red w3-border w3-border-red w3-round">
                <p class="w3-text-red">
                    <b th:text="${error}"></b>
                </p>
            </div>

            <form th:action="@{/editar-subasta}"
                  method="post"
                  enctype="multipart/form-data"
                  class="w3-container">

                <input type="hidden"
                       name="id"
                       th:value="${subasta.id}" />

                <label class="w3-text-dark-grey">
                    <b>Nombre</b>
                </label>

                <input type="text"
                       name="nombre"
                       th:value="${subasta.detalle.nombre}"
                       class="w3-input w3-border w3-round w3-margin-bottom"
                       required />

                <label class="w3-text-dark-grey">
                    <b>Descripción</b>
                </label>

                <textarea name="descripcion"
                          class="w3-input w3-border w3-round w3-margin-bottom"
                          rows="4"
                          th:text="${subasta.detalle.descripcion}">
                </textarea>

                <label class="w3-text-dark-grey">
                    <b>Categoría</b>
                </label>

                <input type="text"
                       name="categoria"
                       th:value="${subasta.detalle.categoria}"
                       class="w3-input w3-border w3-round w3-margin-bottom" />

                <label class="w3-text-dark-grey">
                    <b>Imagen (opcional)</b>
                </label>

                <input type="file"
                       name="imagen"
                       accept="image/*"
                       class="w3-input w3-border w3-round w3-margin-bottom" />
                <div class="w3-row-padding w3-margin-top">

                    <div class="w3-half">
                        <button type="submit"
                                class="w3-button w3-amber w3-hover-dark-grey w3-round w3-block">
                            Guardar cambios
                        </button>
                    </div>

                    <div class="w3-half">
                        <a th:href="@{/detalle-subasta(id=${subasta.id})}"
                           class="w3-button w3-light-grey w3-border w3-round w3-block">
                            Cancelar
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
