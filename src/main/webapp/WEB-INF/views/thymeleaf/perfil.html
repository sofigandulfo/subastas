<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Historial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand app-brand" th:href="@{/subastas}">SubastApp</a>
        <div class="d-flex gap-2">
            <a id="btn-cerrar-sesion" th:if="${session.USUARIO_ID != null}" th:href="@{/logout}" class="btn btn-outline-light">Cerrar sesión</a>
        </div>
    </div>
</nav>

    <main class="app-page">
        <section class="page-header">
            <div>
                <h1 class="page-title">Mi perfil</h1>
                <p class="page-subtitle">Cuenta: <span th:text="${session.EMAIL}">usuario@ejemplo.com</span></p>
            </div>
            <a th:href="@{/subastas}" class="btn btn-outline-secondary">Volver al listado</a>
        </section>

        <input type="hidden" id="session-usuario-id" th:value="${session.USUARIO_ID}">

        <div class="row g-4">
            <section class="col-lg-6">
                <div class="app-card">
                    <div class="app-card-body">
                        <h2 class="section-title">Mis ventas</h2>

                        <ul id="lista-mis-ventas" class="profile-list">
                        </ul>

                        <p id="msg-sin-ventas" class="text-muted mb-0 d-none">Aún no has creado ninguna subasta.</p>

                        <div class="text-center mt-3">
                            <button id="btn-cargar-ventas" class="btn btn-sm btn-outline-primary d-none" onclick="cargarMasVentas()">
                                Cargar más ventas
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-lg-6">
                <div class="app-card">
                    <div class="app-card-body">
                        <h2 class="section-title">Mis pujas</h2>

                        <ul id="lista-mis-pujas" class="profile-list">
                        </ul>

                        <p id="msg-sin-pujas" class="text-muted mb-0 d-none">Aún no has participado en ninguna subasta.</p>

                        <div class="text-center mt-3">
                            <button id="btn-cargar-pujas" class="btn btn-sm btn-outline-primary d-none" onclick="cargarMasPujas()">
                                Cargar más pujas
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <script th:src="@{/js/perfil.js}"></script>
</body>

</html>
