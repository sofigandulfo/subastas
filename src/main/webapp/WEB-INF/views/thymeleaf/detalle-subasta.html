<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Subasta</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        .main-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
        }
    </style>
</head>

<body class="w3-light-grey">

    <div class="main-container">

        <div class="w3-card-4 w3-white w3-round-large">

            <div class="w3-container w3-blue-grey w3-round-small">
                <h2 class="w3-center">Detalle de la Subasta</h2>
            </div>
            <div class="w3-container w3-padding-24">
                <div class="w3-margin-bottom">
                    <label class="w3-text-grey w3-small">NOMBRE DEL PRODUCTO</label>
                    <p class="w3-xlarge w3-border-bottom" th:text="${subasta.nombre}" style="margin-top:0">Nombre de la
                        subasta</p>
                </div>
                <div class="w3-margin-bottom">
                    <label class="w3-text-grey w3-small">DESCRIPCIÓN</label>
                    <p th:text="${subasta.descripcion}">Descripción detallada aquí...</p>
                </div>
                <div class="w3-row-padding w3-margin-bottom" style="margin: 0 -16px;">
                    <div class="w3-half w3-col s6">
                        <label class="w3-text-grey w3-small">PRECIO INICIAL</label>
                        <p class="w3-large w3-text-green">
                            <b th:text="'$' + ${subasta.precioInicial}">$0.00</b>
                        </p>
                    </div>
                    <div class="w3-half w3-col s6">
                        <label class="w3-text-grey w3-small">PRECIO MÁXIMO</label>
                        <p class="w3-large w3-text-red">
                            <b th:if="${subasta.precioMaximo > 0}" th:text="'$' + ${subasta.precioMaximo}">$0.00</b>
                        </p>
                    </div>
                </div>
                <div class="w3-row-padding" style="margin: 0 -16px;">
                    <div class="w3-half w3-col s6">
                        <label class="w3-text-grey w3-small">CATEGORÍA</label>
                        <p><span class="w3-tag w3-light-blue w3-round" th:text="${subasta.categoria}">Categoría</span>
                        </p>
                    </div>
                    <div class="w3-half w3-col s6">
                        <label class="w3-text-grey w3-small">ESTADO</label>
                        <p th:text="${subasta.estado}">Nuevo / Usado</p>
                    </div>
                </div>
                <hr>


                <div class="w3-row-padding" style="margin: 0 -16px;">

                    <div class="w3-half w3-margin-bottom">
                        <a th:href="@{/editar-subasta/{id}(id=${subasta.id})}"
                            class="w3-button w3-amber w3-block w3-round w3-large">
                            Editar
                        </a>
                    </div>


                    <div class="w3-half w3-margin-bottom">

                        <form th:action="@{/eliminar-subasta/{id}(id=${subasta.id})}" method="POST">
                            <button type="submit" class="w3-button w3-red w3-block w3-round w3-large"
                                onclick="return confirm('¿Estás seguro de que deseas eliminar esta subasta?')">
                                Borrar
                            </button>
                        </form>
                    </div>
                </div>
                <hr>
                <a th:href="@{/subastas}" class="w3-button w3-blue-grey w3-block w3-round w3-large">
                    Volver al listado
                </a>
            </div>
        </div>
    </div>
</body>

</html>
