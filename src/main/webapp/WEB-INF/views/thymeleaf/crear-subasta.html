<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Subasta</title>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

<body class="w3-light-grey">

    <div class="w3-content w3-padding-32" style="max-width:700px">

        <div class="w3-card-4 w3-white w3-round-large">

            <div class="w3-container w3-amber w3-round-large">
                <h2 class="w3-center w3-xxlarge  w3-text-white w3-sans-serif">
                    Crear Subasta
                </h2>
            </div>

            <div class="w3-container w3-padding-24">



                <form th:action="@{/crear-subasta}" th:object="${subasta}" enctype="multipart/form-data" method="POST"
                    class="w3-container">

                    <label class="w3-text-dark-grey">
                        <b>Nombre</b>
                    </label>

                    <input th:field="*{nombre}" class="w3-input w3-border w3-round w3-margin-bottom" type="text"
                        placeholder="Ejemplo: Sillón" required>

                    <label class="w3-text-dark-grey">
                        <b>Descripcion</b>
                    </label>

                    <input th:field="*{descripcion}" class="w3-input w3-border w3-round w3-margin-bottom" type="text"
                        placeholder="Describe el producto">

                    <label class="w3-text-dark-grey">
                        <b>Precio Inicial</b>
                    </label>

                    <input th:field="*{precioInicial}" class="w3-input w3-border w3-round w3-margin-bottom"
                        type="number" step="0.01" min="0" required>

                    <label class="w3-text-dark-grey">
                        <b>Precio Maximo</b>
                    </label>

                    <input th:field="*{precioMaximo}" class="w3-input w3-border w3-round w3-margin-bottom" type="number"
                        step="0.01" min="0">

                    <label class="w3-text-dark-grey">
                        <b>Categoria</b>
                    </label>

                    <select th:field="*{categoria}" class="w3-select w3-border w3-round w3-margin-bottom">
                        <option value="" disabled selected>Elegir categoria</option>
                        <option value="Electronica">Electrónica</option>
                        <option value="Entretenimiento">Entretenimiento</option>
                        <option value="Vehiculo">Vehiculo</option>
                        <option value="Ropa">Ropa/Moda</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Deporte">Deporte</option>
                    </select>

                    <label class="w3-text-dark-grey">
                        <b>Estado</b>
                    </label>

                    <select th:field="*{estadoArticulo}" class="w3-select w3-border w3-round w3-margin-bottom">
                        <option value="" disabled selected>Elegir estado</option>
                        <option value="Nuevo">Nuevo</option>
                        <option value="Usado">Usado</option>
                    </select>

                    <label class="w3-text-dark-grey">
                        <b>Imagen</b>
                    </label>

                    <input type="file" name="imagen" accept="image/*"
                        class="w3-input w3-border w3-round w3-margin-bottom">
                        
                    <div th:if="${error}" class="w3-panel w3-pale-red w3-border w3-border-red w3-round">
                        <p class="w3-text-red"><b th:text="${error}"></b></p>
                    </div>

                    <label class="w3-text-dark-grey">
                        <b>Fecha de Finalización</b>
                    </label>

                    <input th:field="*{fechaCierre}" class="w3-input w3-border w3-round w3-margin-bottom"
                           type="datetime-local" required>
                    
                    <button type="submit"
                        class="w3-button w3-amber w3-hover-dark-grey w3-round w3-block w3-margin-top w3-sans-serif">
                        Publicar Subasta
                    </button>

                </form>
            </div>
        </div>
    </div>

</body>

</html>
