<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Subasta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand app-brand" th:href="@{/subastas}">SubastApp</a>
        </div>
    </nav>

    <main class="app-page-narrow">
        <section class="app-card form-card">
            <div class="app-card-body">
                <h1 class="page-title">Crear subasta</h1>
                <p class="page-subtitle mb-4">Completá los datos para publicar tu producto.</p>

                <form th:action="@{/crear-subasta}" th:object="${subasta}" enctype="multipart/form-data" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input id="nombre" th:field="*{nombre}" class="form-control" type="text"
                            placeholder="Ejemplo: Sillón moderno" required>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="4"
                            placeholder="Describe el producto"></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="precio-inicial" class="form-label">Precio inicial</label>
                            <input id="precio-inicial" th:field="*{precioInicial}" class="form-control"
                                type="number" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="precio-maximo" class="form-label">Precio máximo</label>
                            <input id="precio-maximo" th:field="*{precioMaximo}" class="form-control"
                                type="number" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="row g-3 mt-0">
                        <div class="col-md-6">
                            <label for="categoria" class="form-label">Categoría</label>
                            <select id="categoria" th:field="*{categoria}" class="form-select">
                                <option value="" disabled selected>Elegir categoría</option>
                                <option value="Electronica">Electrónica</option>
                                <option value="Entretenimiento">Entretenimiento</option>
                                <option value="Vehiculo">Vehículo</option>
                                <option value="Ropa">Ropa/Moda</option>
                                <option value="Hogar">Hogar</option>
                                <option value="Deporte">Deporte</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="estado-articulo" class="form-label">Estado</label>
                            <select id="estado-articulo" th:field="*{estadoArticulo}" class="form-select">
                                <option value="" disabled selected>Elegir estado</option>
                                <option value="Nuevo">Nuevo</option>
                                <option value="Usado">Usado</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 mt-3">
                        <label for="imagen" class="form-label">Imagen</label>
                        <input id="imagen" type="file" name="imagen" accept="image/*" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="fecha-cierre" class="form-label">Fecha de finalización</label>
                        <input id="fecha-cierre" th:field="*{fechaCierre}" class="form-control"
                            type="datetime-local" required>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <strong id="mensaje-error-crear-subasta" th:text="${error}"></strong>
                    </div>

                    <button id="btn-publicar-subasta" type="submit" class="btn btn-app-primary w-100">
                        Publicar subasta
                    </button>
                    <a th:href="@{/subastas}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
