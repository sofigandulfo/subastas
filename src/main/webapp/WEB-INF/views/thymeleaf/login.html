<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Taller Web I</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand app-brand" th:href="@{/subastas}">SubastApp</a>
        </div>
    </nav>

    <main class="app-page-narrow">
        <section id="loginbox" class="app-card form-card">
            <div class="app-card-body">
                <h1 class="page-title">Iniciar sesión</h1>
                <p class="page-subtitle mb-4">Entrá a tu cuenta para publicar y ofertar en subastas.</p>

                <form action="#" th:action="@{/validar-login}" method="POST" th:object="${datosLogin}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input th:field="*{email}" id="email" type="email" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input th:field="*{password}" type="password" id="password" class="form-control" required />
                    </div>

                    <button id="btn-login" class="btn btn-app-primary w-100" type="Submit" disabled>Login</button>

                    <p th:if="${error != null}" class="alert alert-danger mt-3" th:text="'Error ' + ${error}"></p>
                </form>

                <div class="auth-actions mt-3">
                    <a class="btn btn-outline-danger" th:href="@{/oauth2/authorization/google}">
                        Iniciar sesión con Google
                    </a>
                    <p th:if="${param.error != null}" class="alert alert-danger mb-0">
                        Error al iniciar sesión con Google.
                    </p>
                    <a id="btn-register" class="btn btn-link" href="nuevo-usuario">Registrarme</a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script type="module" th:src="@{js/login.js}"></script>
</body>

</html>
